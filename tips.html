</head>

<body>
    <header id="site-header"></header>

    <section class="tips-hero">
        <div class="halo"></div>
        <div class="container">
            <h1 class="tips-title">Tips & Guides</h1>
            <p class="tips-lead">Quick, practical advice for skincare routines, bulk food storage, and home care. Simple
                steps → real results.</p>
            <div class="toolbar">
                <form class="tips-search" id="tips-search" role="search">
                    <input type="search" id="tips-q" placeholder="Search tips (e.g. cleanser routine, nuts storage)"
                        aria-label="Search tips" />
                    <button type="submit">Search</button>
                </form>
                <div class="chips" id="tips-chips">
                    <button class="chip is-active" data-cat="all" type="button">All</button>
                    <button class="chip" data-cat="skincare" type="button">Skincare</button>
                    <button class="chip" data-cat="bulk" type="button">Bulk foods</button>
                    <button class="chip" data-cat="home" type="button">Home goods</button>
                </div>
            </div>
        </div>
    </section>

    <section class="tips-grid" id="tips-grid"></section>

    <div class="tips-overlay" id="tips-overlay" hidden></div>
    <aside class="tips-modal" id="tips-modal" aria-modal="true" role="dialog" aria-labelledby="tm-title" hidden>
        <div class="tm-hd">
            <div class="tm-title" id="tm-title">Tip</div>
            <button class="tm-close" id="tm-close" aria-label="Close">✕</button>
        </div>
        <div class="tm-body">
            <div class="tm-hero"><img id="tm-img" alt=""></div>
            <div class="tm-content">
                <div class="tm-eyebrow" id="tm-cat"></div>
                <p class="tm-lead" id="tm-lead"></p>
                <ol class="tm-steps" id="tm-steps"></ol>
                <div class="tm-block" id="tm-block" hidden></div>
                <div class="tm-cta">
                    <button class="btn--primary" id="tm-copy" type="button">Copy checklist</button>
                    <a class="btn--ghost" id="tm-link" href="./catalog.html" target="_self" rel="noopener">Open catalog</a>
                </div>
            </div>
        </div>
    </aside>

    <footer id="site-footer"></footer>
    <script defer src="./js/dynamic-loader.js"></script>
    <script defer src="./js/cookies.js"></script>
    <script defer src="./js/nav.js"></script>
    <script defer src="./js/cart.js"></script>
    <script defer src="./js/script.js"></script>
    <script defer src="./js/tips.js"></script>
</body>

</html>
